<link rel="stylesheet" href="shared.css">
<style>
  :root {
    --ink: #0f0e0b;
    --paper: #f5f1e8;
    --cream: #ede9dc;
    --accent: #c8442a;
    --gold: #c9921a;
    --teal: #1a7c74;
    --muted: #7a7268;
    --card-bg: #faf8f2;
    --border: #d9d4c7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    z-index: 9999;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }

  .eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    max-width: 700px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .baseline-tag {
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
  }

  .tag {
    background: var(--ink);
    color: var(--paper);
    padding: 0.25rem 0.65rem;
    border-radius: 2px;
  }

  /* filter bar */
  .filter-bar {
    padding: 1rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .filter-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 0.5rem;
  }

  .filter-btn {
    border: 1.5px solid var(--border);
    background: transparent;
    padding: 0.3rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--ink);
    border-radius: 2px;
    transition: all 0.15s;
  }

  .filter-btn:hover { background: var(--cream); border-color: var(--ink); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .filter-btn.effort-minimal.active { background: var(--teal); border-color: var(--teal); }
  .filter-btn.effort-moderate.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }
  .filter-btn.effort-high.active { background: var(--accent); border-color: var(--accent); }

  /* grid */
  .grid {
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .card[data-effort="NONE"]::before, .card[data-effort="MINIMAL"]::before { background: var(--teal); }
  .card[data-effort="LOW"]::before, .card[data-effort="LOW-MODERATE"]::before { background: var(--gold); }
  .card[data-effort="MODERATE"]::before, .card[data-effort="MODERATE-HIGH"]::before { background: #d4762a; }
  .card[data-effort="HIGH"]::before, .card[data-effort="VERY HIGH"]::before { background: var(--accent); }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    border-color: var(--ink);
  }

  .card.hidden { display: none; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    line-height: 1.2;
  }

  .card-degree {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }

  .effort-badge {
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    white-space: nowrap;
    font-weight: 500;
  }

  [data-effort="NONE"] .effort-badge, [data-effort="MINIMAL"] .effort-badge {
    background: #d4efe8; color: var(--teal);
  }
  [data-effort="LOW"] .effort-badge, [data-effort="LOW-MODERATE"] .effort-badge {
    background: #f5ead3; color: #9a6d0f;
  }
  [data-effort="MODERATE"] .effort-badge, [data-effort="MODERATE-HIGH"] .effort-badge {
    background: #f9e4cc; color: #a0531a;
  }
  [data-effort="HIGH"] .effort-badge, [data-effort="VERY HIGH"] .effort-badge {
    background: #f5d9d4; color: var(--accent);
  }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .meta-block {
    padding: 0.65rem;
    background: var(--cream);
    border-radius: 2px;
  }

  .meta-label {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  .meta-value {
    font-size: 0.72rem;
    line-height: 1.4;
  }

  .verdict {
    font-size: 0.7rem;
    line-height: 1.6;
    color: #3a3730;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }

  .compat-icon {
    font-size: 0.75rem;
    margin-right: 0.25rem;
  }

  /* detail panel */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,14,11,0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: min(520px, 95vw);
    background: var(--paper);
    border-left: 2px solid var(--ink);
    z-index: 201;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    padding: 2rem;
  }

  .panel.open { transform: translateX(0); }

  .panel-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    width: 32px; height: 32px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .panel-close:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .panel-eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    margin-top: 0.5rem;
  }

  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
  }

  .panel-section {
    margin-bottom: 1.75rem;
  }

  .panel-section-title {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .item-list { list-style: none; }

  .item-list li {
    font-size: 0.75rem;
    line-height: 1.7;
    padding: 0.3rem 0;
    display: flex;
    gap: 0.5rem;
  }

  .item-list li::before {
    content: '—';
    color: var(--muted);
    flex-shrink: 0;
  }

  .item-list li.ok::before { content: '✓'; color: var(--teal); }
  .item-list li.warn::before { content: '⚠'; color: var(--gold); }
  .item-list li.star::before { content: '⭐'; }

  .timeline-pill {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    font-size: 0.65rem;
    padding: 0.4rem 0.8rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .verdict-panel {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    font-size: 0.75rem;
    line-height: 1.7;
    font-style: italic;
  }

  /* stat bar */
  .stat-bar-wrap { margin-bottom: 1.5rem; }
  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    color: var(--muted);
  }
  .stat-bar-track {
    height: 6px;
    background: var(--cream);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* footer */
  footer {
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeIn 0.3s ease both; }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>

const effortOrder = { "NONE": 0, "MINIMAL": 1, "LOW": 2, "LOW-MODERATE": 3, "MODERATE": 4, "MODERATE-HIGH": 5, "HIGH": 6, "VERY HIGH": 7 };
const effortBucket = (e) => {
  if (["NONE","MINIMAL"].includes(e)) return "minimal";
  if (["LOW","LOW-MODERATE","MODERATE"].includes(e)) return "moderate";
  return "high";
};
const effortPercent = (e) => Math.round((effortOrder[e] / 7) * 100);

function buildCards() {
  const grid = document.getElementById('grid');
  pathways.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.effort = p.effort;
    card.dataset.bucket = effortBucket(p.effort);
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-degree">${p.degree}</div>
          <div class="card-title">${p.title}</div>
        </div>
        <span class="effort-badge">${p.effort}</span>
      </div>
      <div class="card-meta">
        <div class="meta-block">
          <div class="meta-label">Extra Courses</div>
          <div class="meta-value">${p.courses}</div>
        </div>
        <div class="meta-block">
          <div class="meta-label">Extra Exp.</div>
          <div class="meta-value">${p.experience}</div>
        </div>
      </div>
      <div class="verdict"><span class="compat-icon">${p.compat.split(' ')[0]}</span>${p.verdict}</div>
    `;
    card.addEventListener('click', () => openPanel(p));
    grid.appendChild(card);
  });
}

function openPanel(p) {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const content = document.getElementById('panelContent');

  const courseItems = p.coursesDetail.map(i =>
    `<li class="${i.type}">${i.text}</li>`).join('');
  const expItems = p.expDetail.map(i =>
    `<li class="${i.type}">${i.text}</li>`).join('');

  const ep = effortPercent(p.effort);
  const barColor = ep <= 15 ? 'var(--teal)' : ep <= 45 ? 'var(--gold)' : ep <= 70 ? '#d4762a' : 'var(--accent)';

  content.innerHTML = `
    <div class="panel-eyebrow">${p.degree} · #${p.id} of 17</div>
    <h2 class="panel-title">${p.title}</h2>
    
    <div class="panel-section">
      <div class="panel-section-title">Effort required beyond current plan</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-label"><span>Courses</span><span>${p.courses}</span></div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${Math.min(100, (parseInt(p.courses)||0) * 30)}%; background:${barColor}"></div></div>
      </div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-label"><span>Overall effort</span><span>${p.effort}</span></div>
        <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${ep}%; background:${barColor}"></div></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Coursework — what you need</div>
      <ul class="item-list">${courseItems}</ul>
    </div>
    
    <div class="panel-section">
      <div class="panel-section-title">Experience — what you need</div>
      <ul class="item-list">${expItems}</ul>
    </div>
    
    <div class="panel-section">
      <div class="panel-section-title">Timeline</div>
      <span class="timeline-pill">${p.timeline}</span>
    </div>
    
    <div class="panel-section">
      <div class="panel-section-title">Verdict</div>
      <div class="verdict-panel">${p.verdict}</div>
    </div>
  `;

  panel.classList.add('open');
  overlay.classList.add('open');

  // animate bars
  setTimeout(() => {
    content.querySelectorAll('.stat-bar-fill').forEach(b => {
      const w = b.style.width;
      b.style.width = '0';
      requestAnimationFrame(() => { b.style.width = w; });
    });
  }, 50);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card => {
      const show = filter === 'all' || card.dataset.bucket === filter;
      card.classList.toggle('hidden', !show);
    });
    // update count
    document.querySelector('[data-filter="all"]').textContent = `All (17)`;
    if (filter !== 'all') {
      const visible = document.querySelectorAll('.card:not(.hidden)').length;
      btn.textContent = btn.textContent.replace(/\s*\(\d+\)/, '') + ` (${visible})`;
    }
  });
});

buildCards();
</script>
